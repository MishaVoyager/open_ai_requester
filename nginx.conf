server {
    listen 80;
    server_name mishavoyager.fyi;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name mishavoyager.fyi;

    ssl_certificate /etc/letsencrypt/live/mishavoyager.fyi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mishavoyager.fyi/privkey.pem;

    # Docker DNS: резолвим app при запросе, а не при старте nginx
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Spotify OAuth callback (pet_project bot on host :8888)
    location /callback {
        proxy_pass http://host.docker.internal:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://host.docker.internal:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $upstream http://app:7999;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}